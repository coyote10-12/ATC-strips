<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>3‑Column Flight Strip Rack</title>
    <link rel="stylesheet" href="file.css">
</head>
<body>

<header>3‑Column Flight Strip Rack • GND • LAND • DEP</header>

<div id="rack">
    <div class="column" data-col="gnd">
        <div class="col-header">
            <span>Ground</span>
            <button data-add>+ Strip</button>
        </div>
        <div class="col-body" data-body>
            <div class="placeholder">Drop strips here</div>
        </div>
    </div>

    <div class="column" data-col="land">
        <div class="col-header">
            <span>Landing</span>
            <button data-add>+ Strip</button>
        </div>
        <div class="col-body" data-body>
            <div class="placeholder">Drop strips here</div>
        </div>
    </div>

    <div class="column" data-col="dep">
        <div class="col-header">
            <span>Departure</span>
            <button data-add>+ Strip</button>
        </div>
        <div class="col-body" data-body>
            <div class="placeholder">Drop strips here</div>
        </div>
    </div>
</div>

<script src="main.js"></script>
</body>
</html>
